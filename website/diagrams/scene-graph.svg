<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <!-- Renderer -->
  <rect x="20" y="170" width="120" height="40" rx="6" fill="#ffffff" stroke="#c4825a" stroke-width="2"/>
  <text x="80" y="195" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Renderer</text>

  <!-- Arrow: Renderer -> Scene -->
  <line x1="140" y1="190" x2="190" y2="190" stroke="#c4825a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Scene -->
  <rect x="200" y="170" width="120" height="40" rx="6" fill="#c4825a" stroke="#c4825a" stroke-width="2"/>
  <text x="260" y="195" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Scene</text>

  <!-- Vertical lines from Scene down -->
  <line x1="260" y1="210" x2="260" y2="240" stroke="#e8e0d8" stroke-width="2"/>

  <!-- Horizontal connector -->
  <line x1="120" y1="260" x2="680" y2="260" stroke="#e8e0d8" stroke-width="2"/>

  <!-- Vertical drops to children -->
  <line x1="120" y1="260" x2="120" y2="280" stroke="#e8e0d8" stroke-width="2"/>
  <line x1="300" y1="260" x2="300" y2="280" stroke="#e8e0d8" stroke-width="2"/>
  <line x1="500" y1="260" x2="500" y2="280" stroke="#e8e0d8" stroke-width="2"/>
  <line x1="680" y1="260" x2="680" y2="280" stroke="#e8e0d8" stroke-width="2"/>

  <!-- Center vertical from Scene -->
  <line x1="260" y1="240" x2="260" y2="260" stroke="#e8e0d8" stroke-width="2"/>

  <!-- Camera -->
  <rect x="60" y="280" width="120" height="40" rx="6" fill="#ffffff" stroke="#e8e0d8" stroke-width="2"/>
  <text x="120" y="305" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Camera</text>

  <!-- Lights -->
  <rect x="220" y="280" width="160" height="40" rx="6" fill="#ffffff" stroke="#e8e0d8" stroke-width="2"/>
  <text x="300" y="305" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Lights</text>
  <text x="300" y="335" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="11">(Ambient, Directional)</text>

  <!-- Group -->
  <rect x="430" y="280" width="140" height="40" rx="6" fill="#ffffff" stroke="#c4825a" stroke-width="2"/>
  <text x="500" y="305" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Group</text>

  <!-- GLTF Model -->
  <rect x="610" y="280" width="140" height="40" rx="6" fill="#ffffff" stroke="#e8e0d8" stroke-width="2"/>
  <text x="680" y="305" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="13" font-weight="600">GLTF Model</text>

  <!-- Lines from Group to Meshes -->
  <line x1="500" y1="320" x2="500" y2="340" stroke="#e8e0d8" stroke-width="2"/>
  <line x1="420" y1="360" x2="580" y2="360" stroke="#e8e0d8" stroke-width="2"/>
  <line x1="420" y1="360" x2="420" y2="370" stroke="#e8e0d8" stroke-width="2"/>
  <line x1="580" y1="360" x2="580" y2="370" stroke="#e8e0d8" stroke-width="2"/>
  <line x1="500" y1="340" x2="500" y2="360" stroke="#e8e0d8" stroke-width="2"/>

  <!-- Mesh 1 -->
  <rect x="360" y="370" width="120" height="40" rx="6" fill="#ffffff" stroke="#e8e0d8" stroke-width="2"/>
  <text x="420" y="389" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Mesh</text>
  <text x="420" y="403" text-anchor="middle" fill="#c4825a" font-family="system-ui, sans-serif" font-size="10">Geometry + Material</text>

  <!-- Mesh 2 -->
  <rect x="520" y="370" width="120" height="40" rx="6" fill="#ffffff" stroke="#e8e0d8" stroke-width="2"/>
  <text x="580" y="389" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Mesh</text>
  <text x="580" y="403" text-anchor="middle" fill="#c4825a" font-family="system-ui, sans-serif" font-size="10">Geometry + Material</text>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Three.js Scene Graph</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c4825a"/>
    </marker>
  </defs>
</svg>