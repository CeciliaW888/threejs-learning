<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c4825a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Three.js Render Pipeline</text>

  <!-- Box 1: JavaScript Code -->
  <rect x="10" y="70" width="110" height="50" rx="6" fill="#c4825a" stroke="#c4825a" stroke-width="2"/>
  <text x="65" y="100" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">JavaScript Code</text>

  <!-- Arrow 1 -->
  <line x1="120" y1="95" x2="142" y2="95" stroke="#c4825a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 2: Scene Graph -->
  <rect x="152" y="70" width="110" height="50" rx="6" fill="#ffffff" stroke="#e8e0d8" stroke-width="2"/>
  <text x="207" y="100" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Scene Graph</text>

  <!-- Arrow 2 -->
  <line x1="262" y1="95" x2="284" y2="95" stroke="#c4825a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 3: Vertex Shader -->
  <rect x="294" y="70" width="110" height="50" rx="6" fill="#ffffff" stroke="#e8e0d8" stroke-width="2"/>
  <text x="349" y="100" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Vertex Shader</text>

  <!-- Arrow 3 -->
  <line x1="404" y1="95" x2="426" y2="95" stroke="#c4825a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 4: Rasterization -->
  <rect x="436" y="70" width="110" height="50" rx="6" fill="#ffffff" stroke="#e8e0d8" stroke-width="2"/>
  <text x="491" y="100" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Rasterization</text>

  <!-- Arrow 4 -->
  <line x1="546" y1="95" x2="568" y2="95" stroke="#c4825a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 5: Fragment Shader -->
  <rect x="578" y="70" width="110" height="50" rx="6" fill="#ffffff" stroke="#e8e0d8" stroke-width="2"/>
  <text x="633" y="100" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Fragment Shader</text>

  <!-- Arrow 5 -->
  <line x1="688" y1="95" x2="710" y2="95" stroke="#c4825a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 6: Screen -->
  <rect x="720" y="70" width="70" height="50" rx="6" fill="#c4825a" stroke="#c4825a" stroke-width="2"/>
  <text x="755" y="100" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Screen</text>

  <!-- Annotations -->
  <text x="65" y="145" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="10" opacity="0.6">CPU</text>
  <text x="207" y="145" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="10" opacity="0.6">CPU</text>
  <text x="349" y="145" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="10" opacity="0.6">GPU</text>
  <text x="491" y="145" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="10" opacity="0.6">GPU</text>
  <text x="633" y="145" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="10" opacity="0.6">GPU</text>
  <text x="755" y="145" text-anchor="middle" fill="#2c2420" font-family="system-ui, sans-serif" font-size="10" opacity="0.6">Output</text>

  <!-- Divider line between CPU and GPU -->
  <line x1="252" y1="55" x2="252" y2="160" stroke="#c4825a" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="180" y="175" text-anchor="middle" fill="#c4825a" font-family="system-ui, sans-serif" font-size="10" opacity="0.6">CPU Side</text>
  <text x="490" y="175" text-anchor="middle" fill="#c4825a" font-family="system-ui, sans-serif" font-size="10" opacity="0.6">GPU Side</text>
</svg>